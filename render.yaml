services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/queuestorm-investigator
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: PORT
        value: 8000
    healthCheckPath: /health
