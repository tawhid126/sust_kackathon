services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/queuestorm-investigator
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PORT
        value: 8000
    healthCheckPath: /health
